<!DOCTYPE html>
<html>
  <head>
    <title>Hello, world</title>
    <script src='/app.js'></script>
  </head>
  <body>
    <canvas id="video_canvas"></canvas>
    <div style="border: 1px solid black; display: inline-block"><canvas id="perf_canvas" width="300px" height="200px"></canvas></div>

	<div>cv_ctl <div id="message-cv_ctl">Initializing...</div></div>
	<div>cv_tm <div id="message-cv_tm">Initializing...</div></div>
	<div>cv_s <div id="message-cv_s">Initializing...</div></div>
	<div>hw_ctl <div id="message-hw_ctl">Initializing...</div></div>
	<div>hw_tm <div id="message-hw_tm">Initializing...</div></div>

    <div>Perf <span id="cv_fps"></span> fps, time <span id="cv_time"></span> ms</div>
    <div>Denoise level <input type="range" id="denoiseLevel" name="denoiseLevel" min="0" max="20" step="0.1"/><span id="denoiseLevelView"></span></div>

    <table>
        <thead>
            <tr>
                <td colspan="2"><input id="command-cv_ctl" type="text"/><input id="send-cv_ctl" type="button" value="cv" /></td>
                <td colspan="2"><input id="command-hw_ctl" type="text"/><input id="send-hw_ctl" type="button" value="hw" /></td>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td style="vertical-align: top;"><div id="log-cv_ctl"></div></td>
                <td style="vertical-align: top;"><div id="log-hw_ctl"></div></td>
                <td style="vertical-align: top;"><div id="log-hw_tm"></div></td>
            </tr>
        </tbody>
    </table>
  </body>
</html>

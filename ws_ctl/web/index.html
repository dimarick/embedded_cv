<!DOCTYPE html>
<html>
  <head>
    <title>Hello, world</title>
    <script src='/app.js'></script>
    <script type="text/javascript" src="http://192.168.1.41:8080/players/js/jquery-1.12.2.min.js"></script>
    <script type="text/javascript" src="http://192.168.1.41:8080/players/js/adapter-7.4.0.min.js"></script>
    <script type="text/javascript" src="http://192.168.1.41:8080/players/js/srs.sdk.js"></script>
    <script type="text/javascript" src="http://192.168.1.41:8080/players/js/winlin.utility.js"></script>
    <script type="text/javascript" src="http://192.168.1.41:8080/players/js/srs.page.js"></script>
  </head>
  <body>
    <video id="rtc_media_player" autoplay></video>
    <canvas id="video_canvas"></canvas>
    <div style="border: 1px solid black; display: inline-block"><canvas id="perf_canvas" width="300px" height="200px"></canvas></div>

	<div>cv_ctl <div id="message-cv_ctl">Initializing...</div></div>
	<div>cv_tm <div id="message-cv_tm">Initializing...</div></div>
	<div>hw_ctl <div id="message-hw_ctl">Initializing...</div></div>
	<div>hw_tm <div id="message-hw_tm">Initializing...</div></div>

    <div>Perf <span id="cv_fps"></span> fps, time <span id="cv_time"></span> ms</div>
    <div>Denoise level <input type="range" id="denoiseLevel" name="denoiseLevel" min="0" max="20" step="0.1"/><span id="denoiseLevelView"></span></div>

    <table>
        <thead>
            <tr>
                <td colspan="2"><input id="command-cv_ctl" type="text"/><input id="send-cv_ctl" type="button" value="cv" /></td>
                <td colspan="2"><input id="command-hw_ctl" type="text"/><input id="send-hw_ctl" type="button" value="hw" /></td>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td style="vertical-align: top;"><div id="log-cv_ctl"></div></td>
                <td style="vertical-align: top;"><div id="log-hw_ctl"></div></td>
                <td style="vertical-align: top;"><div id="log-hw_tm"></div></td>
            </tr>
        </tbody>
    </table>
    <script type="text/javascript">
        $(function(){
            var sdk = null; // Global handler to do cleanup when republishing.
            var startPlay = function() {
                $('#rtc_media_player').show();

                // Close PC when user replay.
                if (sdk) {
                    sdk.close();
                }
                sdk = new SrsRtcWhipWhepAsync();

                // User should set the stream when publish is done, @see https://webrtc.org/getting-started/media-devices
                // However SRS SDK provides a consist API like https://webrtc.org/getting-started/remote-streams
                $('#rtc_media_player').prop('srcObject', sdk.stream);
                // Optional callback, SDK will add track to stream.
                // sdk.ontrack = function (event) { console.log('Got track', event); sdk.stream.addTrack(event.track); };

                // For example: webrtc://r.ossrs.net/live/livestream
                sdk.play('http://192.168.1.41:1985/rtc/v1/whep/?app=live&stream=livestream.flv', {
                    videoOnly: $('#ch_videoonly').prop('checked'),
                    audioOnly: $('#ch_audioonly').prop('checked'),
                }).then(function(session){
                }).catch(function (reason) {
                    sdk.close();
                    $('#rtc_media_player').hide();
                    console.error(reason);
                });
            };

            $('#rtc_media_player').hide();
            $('#rtc_media_player').prop('muted', true);
            console.warn('For autostart, we should mute it, see https://www.jianshu.com/p/c3c6944eed5a ' +
                'or https://developers.google.com/web/updates/2017/09/autoplay-policy-changes#audiovideo_elements');
            window.addEventListener("load", function(){ startPlay(); });
        });
    </script>
  </body>
</html>

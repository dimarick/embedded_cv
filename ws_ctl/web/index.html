<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления</title>
    <!-- Подключение Bulma CSS -->
    <link rel="stylesheet" href="/node_modules/bulma/css/bulma.min.css">
    <!-- Подключение Font Awesome CSS -->
    <link rel="stylesheet" href="/node_modules/@fortawesome/fontawesome-free/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <script type="module" src="/js/app.js"></script>
    <style>

    </style>
</head>
<body>
    <div class="app-container">
        <!-- ЛЕВАЯ ПАНЕЛЬ (Управление и настройки) -->
        <aside class="left-panel">
            <a class="panel-toggle button is-small is-light is-rounded">
                <i class="fas fa-chevron-left"></i>
            </a>

            <p class="menu-label title is-5">Управление</p>
            <ul class="menu-list">
                <li><a><i class="fas fa-plug"></i><span class="menu-text">&nbsp;Подключение</span></a></li>
                <li><a><i class="fas fa-map-marked-alt"></i><span class="menu-text">&nbsp;Навигация</span></a></li>
            </ul>

            <p class="menu-label title is-5 mt-5">Настройки</p>
            <ul class="menu-list">
                <li><a><i class="fas fa-sliders-h"></i><span class="menu-text">&nbsp;Параметры робота</span></a></li>
                <li><a><i class="fas fa-network-wired"></i><span class="menu-text">&nbsp;Сеть</span></a></li>
                <li><a><i class="fas fa-save"></i><span class="menu-text">&nbsp;Сохранить профиль</span></a></li>
            </ul>

            <div class="is-flex is-justify-content-center mt-auto">
                <button class="button is-danger is-rounded is-small">
                    <i class="fas fa-power-off"></i><span class="menu-text">&nbsp;Аварийный стоп</span>
                </button>
            </div>
        </aside>

        <!-- ЦЕНТРАЛЬНАЯ ПАНЕЛЬ (Видео и главный контент) -->
        <main class="main-panel">
            <!-- Панель выбора лейаута -->
            <div class="layout-controls">
                <button class="layout-btn active" data-layout="dual" title="Одна колонка">
                    <i class="fas fa-square"></i>
                </button>
                <button class="layout-btn" data-layout="quad" title="Две колонки">
                    <i class="fas fa-th-large"></i> 2
                </button>
            </div>

            <!-- Контейнер для viewport'ов. layout-single активен по умолчанию -->
            <div class="viewport-container layout-single">
                <div id="app-viewports" class="viewport-grid">
                    <!-- Viewport 1 (Основной, всегда видим) -->
                    <div class="viewport active" id="viewport-1">
                        <div class="viewport-title">КАМЕРА 1</div>
                        <canvas class="viewport-canvas-stream" data-name="Debug 0"></canvas>
                        <div class="viewport-controls">
                            <button class="viewport-btn"><i class="fas fa-star"></i></button>
                            <button class="viewport-btn"><i class="fas fa-maximize"></i></button>
                        </div>
                    </div>
                    <!-- Следующие viewport'ы скрыты в лейауте "single" -->
                    <div class="viewport active" id="viewport-2">
                        <div class="viewport-title">КАМЕРА 2</div>
                        <canvas class="viewport-canvas-stream" data-name="Debug 1"></canvas>
                        <div class="viewport-controls">
                            <button class="viewport-btn"><i class="fas fa-star"></i></button>
                            <button class="viewport-btn"><i class="fas fa-maximize"></i></button>
                        </div>
                    </div>
                    <div class="viewport is-hidden" id="viewport-3">
                        <div class="viewport-title">КАМЕРА 3</div>
                        <canvas class="viewport-canvas-stream" data-name="Plain 0"></canvas>
                        <div class="viewport-controls">
                            <button class="viewport-btn"><i class="fas fa-star"></i></button>
                            <button class="viewport-btn"><i class="fas fa-maximize"></i></button>
                        </div>
                    </div>
                    <div class="viewport is-hidden" id="viewport-4">
                        <div class="viewport-title">КАРТА</div>
                        <canvas class="viewport-canvas-stream" data-name="Plain 1"></canvas>
                        <div class="viewport-controls">
                            <button class="viewport-btn"><i class="fas fa-star"></i></button>
                            <button class="viewport-btn"><i class="fas fa-maximize"></i></button>
                        </div>
                    </div>
                    <div class="viewport is-hidden" id="viewport-5">
                        <div class="viewport-title">КАМЕРА 3</div>
                        <canvas class="viewport-canvas-stream" data-name="Rectified 0"></canvas>
                        <div class="viewport-controls">
                            <button class="viewport-btn"><i class="fas fa-star"></i></button>
                            <button class="viewport-btn"><i class="fas fa-maximize"></i></button>
                        </div>
                    </div>
                    <div class="viewport is-hidden" id="viewport-6">
                        <div class="viewport-title">КАРТА</div>
                        <canvas class="viewport-canvas-stream" data-name="Rectified 1"></canvas>
                        <div class="viewport-controls">
                            <button class="viewport-btn"><i class="fas fa-star"></i></button>
                            <button class="viewport-btn"><i class="fas fa-maximize"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <aside class="right-panel">
            <!-- Кнопка сворачивания всей панели -->
            <div class="panel-header">
                <a class="panel-toggle-right panel-toggle button is-small is-light is-rounded">
                    <i class="fas fa-chevron-left"></i>
                </a>
            </div>

            <!-- Контент панели (скрывается при сворачивании) -->
            <div class="panel-content">
                <!-- Секция телеметрии -->
                <div class="right-panel-section">
                    <div class="right-panel-header">
                        <h2 class="title is-5">📊 <span class="title-text">Телеметрия</span></h2>
                        <div class="right-panel-controls">
                            <span class="collapse-icon"><i class="fas fa-chevron-up"></i></span>
                        </div>
                    </div>
                    <div class="right-panel-content telemetry-box">
                        <!-- существующее содержимое телеметрии -->
                        <div class="field is-horizontal">
                            <div class="field-label is-normal">
                                <label class="label">Батарея</label>
                            </div>
                            <div class="field-body">
                                <div class="field">
                                    <progress class="progress is-primary" value="78" max="100">78%</progress>
                                </div>
                            </div>
                        </div>
                        <div>
                            <strong>Передача данных:</strong>
                            <i class="fa fa-upload"></i>
                            <span class="telemetry-value" name="network.bps.sent.value">0</span>
                            <span class="telemetry-value" name="network.bps.sent.unit">B/s</span>
                            <i class="fa fa-download"></i>
                            <span class="telemetry-value" name="network.bps.received.value">0</span>
                            <span class="telemetry-value" name="network.bps.received.unit">B/s</span>
                        </div>
                        <div>
                            <strong>Всего передано:</strong>
                            <i class="fa fa-upload"></i>
                            <span class="telemetry-value" name="network.bytes.sent.value">0</span>
                            <span class="telemetry-value" name="network.bytes.sent.unit">B/s</span>
                            <i class="fa fa-download"></i>
                            <span class="telemetry-value" name="network.bytes.received.value">0</span>
                            <span class="telemetry-value" name="network.bytes.received.unit">B/s</span>
                        </div>
                        <div><strong>Состояние:</strong> <span id="connection-status" class="has-text-success">✓ Активно</span></div>
                    </div>
                </div>

                <!-- Секция журнала событий -->
                <div id="logs-container" class="right-panel-section log-section">
                    <div class="right-panel-header">
                        <h2 class="title is-5">📝 <span class="title-text">Журнал событий</span></h2>
                        <div class="right-panel-controls">
                            <button class="fullscreen-log-btn"><i class="fas fa-expand"></i></button>
                            <span class="collapse-icon"><i class="fas fa-chevron-up"></i></span>
                        </div>
                    </div>
                    <div class="right-panel-content log-box">
                        <!-- сюда будут добавляться логи через JS -->
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <!-- Здесь позже будут добавлены модальные окна (для настроек) -->

    <script>
        // Базовый скрипт для демонстрации переключения лейаутов и сворачивания панели
        document.addEventListener('DOMContentLoaded', function() {
            // Переключение лейаута основной панели
            const layoutButtons = document.querySelectorAll('.layout-btn');
            const viewportContainer = document.querySelector('.viewport-container');
            const viewports = document.querySelectorAll('.viewport');

            layoutButtons.forEach(button => {
                button.addEventListener('click', function() {
                    // Удаляем класс active у всех кнопок
                    layoutButtons.forEach(btn => btn.classList.remove('active'));
                    // Добавляем active нажатую кнопку
                    this.classList.add('active');

                    const layout = this.getAttribute('data-layout');

                    // Удаляем все классы лейаута у контейнера
                    viewportContainer.classList.remove('layout-single', 'layout-dual', 'layout-quad');
                    // Добавляем нужный класс лейаута
                    viewportContainer.classList.add(`layout-${layout}`);

                    // Показываем/скрываем viewport'ы в зависимости от лейаута
                    if (layout === 'single') {
                        viewports.forEach((vp, idx) => idx === 0 ? vp.classList.remove('is-hidden') : vp.classList.add('is-hidden'));
                    } else if (layout === 'dual') {
                        viewports.forEach((vp, idx) => idx < 2 ? vp.classList.remove('is-hidden') : vp.classList.add('is-hidden'));
                    } else if (layout === 'quad') {
                        viewports.forEach(vp => vp.classList.remove('is-hidden'));
                    }
                });
            });

            // Сворачивание/разворачивание левой панели
            const panelToggle = document.querySelector('.panel-toggle');
            const leftPanel = document.querySelector('.left-panel');

            panelToggle.addEventListener('click', function() {
                leftPanel.classList.toggle('collapsed');
                // Меняем иконку на кнопке
                const icon = this.querySelector('i');
                if (leftPanel.classList.contains('collapsed')) {
                    icon.classList.remove('fa-chevron-left');
                    icon.classList.add('fa-chevron-right');
                } else {
                    icon.classList.remove('fa-chevron-right');
                    icon.classList.add('fa-chevron-left');
                }
            });

            // Демонстрация: делает активным viewport при клике на "звезду"
            const viewportStars = document.querySelectorAll('.viewport-btn .fa-star');
            viewportStars.forEach(star => {
                star.addEventListener('click', function(e) {
                    e.stopPropagation(); // Останавливаем всплытие события
                    const parentViewport = this.closest('.viewport');
                    // Убираем активный класс у всех viewport'ов
                    viewports.forEach(vp => vp.classList.remove('active'));
                    // Добавляем активный класс родительскому viewport'у
                    parentViewport.classList.add('active');
                });
            });
        });

        document.addEventListener('DOMContentLoaded', function() {
            // 1. Сворачивание правой панели
            const rightPanel = document.querySelector('.right-panel');
            const toggleRight = document.querySelector('.panel-toggle-right');

            function toggleRightPanel(rightPanel, icon) {
                rightPanel.classList.toggle('collapsed');
                if (rightPanel.classList.contains('collapsed')) {
                    icon.classList.remove('fa-chevron-right');
                    icon.classList.add('fa-chevron-left');
                } else {
                    icon.classList.remove('fa-chevron-left');
                    icon.classList.add('fa-chevron-right');
                }
            }

            if (toggleRight) {
                toggleRight.addEventListener('click', function() {
                    const icon = this.querySelector('i');
                    toggleRightPanel(rightPanel, icon);
                });
            }

            // 2. Сворачивание секций по клику на заголовок
            const sections = document.querySelectorAll('.right-panel-section');
            sections.forEach(section => {
                const header = section.querySelector('.right-panel-header');
                if (header) {
                    header.addEventListener('click', function(e) {
                        // Игнорируем клик по кнопке внутри заголовка (например, fullscreen)
                        if (e.target.closest('.fullscreen-log-btn')) return;

                        if (rightPanel.classList.contains('collapsed')) {
                            toggleRightPanel(rightPanel, toggleRight.querySelector('i'));
                            return;
                        }

                        section.classList.toggle('collapsed');
                        const icon = section.querySelector('.collapse-icon i');
                        if (section.classList.contains('collapsed')) {
                            icon.classList.remove('fa-chevron-up');
                            icon.classList.add('fa-chevron-down');
                        } else {
                            icon.classList.remove('fa-chevron-down');
                            icon.classList.add('fa-chevron-up');
                        }
                    });
                }
            });

            // 3. Обработчик кнопки полного экрана логов (заглушка)
            const fullscreenBtn = document.querySelector('.fullscreen-log-btn');
            if (fullscreenBtn) {
                fullscreenBtn.addEventListener('click', function(e) {
                    e.stopPropagation(); // предотвращаем всплытие к заголовку
                    console.log('Кнопка полного экрана логов нажата');
                    // Здесь можно реализовать логику: скрыть телеметрию, развернуть лог-бокс и т.д.
                });
            }
        });
    </script>
</body>
</html>
